<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalecia Styles</title>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #fff; color: #222; }
    header { background-color: #111; color: #f7c948; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
    nav { background-color: #333; color: #fff; padding: 10px; text-align: center; }
    nav button { margin: 0 5px; padding: 8px 12px; background: #f7c948; border: none; cursor: pointer; }
    .container { padding: 20px; }
    .product-card img { width: 100%; height: 150px; object-fit: cover; }
    .product-card { border: 1px solid #ccc; padding: 10px; text-align: center; }
    .product-card h4, .product-card p { margin: 10px 0; }
    .product-card button { padding: 6px 12px; background-color: #28a745; color: white; border: none; cursor: pointer; }
    .cart-section, .orders-section, .product-section { margin: 20px 0; padding: 20px; border: 1px solid #ccc; max-width: 800px; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
    .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ddd; }
    .cart-total { font-weight: bold; text-align: right; margin-top: 10px; }
    .checkout-button { padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>
  <header>Kalecia Styles</header>
  <nav>
    <button onclick="showProducts()">Shop</button>
    <button onclick="showCart()">Cart (<span id="cart-count">0</span>)</button>
    <button id="admin-orders-btn" style="display:none" onclick="showOrders()">Orders</button>
  </nav>

  <div id="auth-section" style="padding: 20px;">
    <h3>Login or Register</h3>
    <input type="email" id="email" placeholder="Email" /><br><br>
    <input type="password" id="password" placeholder="Password" /><br><br>
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">
    <section id="products-section" class="product-section">
      <h2>Shop Products</h2>
      <div class="products-grid" id="product-list"></div>
    </section>

    <section id="upload-section" class="product-section" style="display: none;">
      <h2>Upload New Product</h2>
      <input type="text" id="product-name" placeholder="Product Name" /><br><br>
      <input type="number" id="product-price" placeholder="Product Price" /><br><br>
      <input type="file" id="product-image" /><br><br>
      <button onclick="uploadProduct()">Upload Product</button>
    </section>

    <section id="cart-section" class="cart-section" style="display: none;">
      <h2>Your Cart</h2>
      <div id="cart-items"></div>
      <div class="cart-total">Total: $<span id="cart-total">0.00</span></div>
      <button class="checkout-button" onclick="checkout()">Place Order</button>
    </section>

    <section id="orders-section" class="orders-section" style="display: none;">
      <h2>Customer Orders</h2>
      <div id="orders-list"></div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, serverTimestamp, query, orderBy, doc, getDoc } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA8ZFMWYXosLhPP6gvvD0JG9EV_dfC7zmw",
      authDomain: "kalecia-styles-2c45b.firebaseapp.com",
      projectId: "kalecia-styles-2c45b",
      storageBucket: "kalecia-styles-2c45b.appspot.com",
      messagingSenderId: "349514768899",
      appId: "1:349514768899:web:8a61145e676c7ac966e436"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const storage = getStorage(app);
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let currentUser = null;

    function showProducts() {
      hideAllSections();
      document.getElementById('products-section').style.display = 'block';
    }

    function showCart() {
      hideAllSections();
      document.getElementById('cart-section').style.display = 'block';
      const container = document.getElementById("cart-items");
      container.innerHTML = "";
      let total = 0;
      cart.forEach((item) => {
        const div = document.createElement("div");
        div.className = "cart-item";
        div.innerHTML = `<span>${item.name}</span><span>$${item.price.toFixed(2)}</span>`;
        container.appendChild(div);
        total += item.price;
      });
      document.getElementById("cart-total").innerText = total.toFixed(2);
    }

    function hideAllSections() {
      document.querySelectorAll('section').forEach(sec => sec.style.display = 'none');
    }

    function addToCart(item) {
      cart.push(item);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
      alert(`${item.name} added to cart.`);
    }

    function updateCartCount() {
      document.getElementById('cart-count').innerText = cart.length;
    }

    function checkout() {
      if (!currentUser) return alert("Please log in to place an order.");
      addDoc(collection(db, "orders"), {
        userId: currentUser.email,
        items: cart,
        status: "pending",
        timestamp: serverTimestamp()
      }).then(() => {
        alert("Order placed!");
        cart = [];
        localStorage.removeItem('cart');
        updateCartCount();
        showProducts();
      });
    }

    function showOrders() {
      hideAllSections();
      document.getElementById('orders-section').style.display = 'block';
      const ordersQuery = query(collection(db, "orders"), orderBy("timestamp", "desc"));
      getDocs(ordersQuery).then(snapshot => {
        const container = document.getElementById("orders-list");
        container.innerHTML = "";
        snapshot.forEach(doc => {
          const data = doc.data();
          const div = document.createElement("div");
          div.innerHTML = `<p><strong>User:</strong> ${data.userId}<br><strong>Items:</strong> ${data.items.map(i => i.name).join(", ")}<br><strong>Total:</strong> $${data.items.reduce((sum, i) => sum + i.price, 0).toFixed(2)}<br><strong>Status:</strong> ${data.status}</p><hr>`;
          container.appendChild(div);
        });
      });
    }

    async function uploadProduct() {
      const name = document.getElementById("product-name").value.trim();
      const price = parseFloat(document.getElementById("product-price").value);
      const imageFile = document.getElementById("product-image").files[0];

      if (!name || !price || !imageFile) {
        alert("Please fill in all fields.");
        return;
      }

      const storageRef = ref(storage, `products/${Date.now()}-${imageFile.name}`);
      await uploadBytes(storageRef, imageFile);
      const imageUrl = await getDownloadURL(storageRef);

      await addDoc(collection(db, "products"), {
        name,
        price,
        imageUrl,
        timestamp: serverTimestamp()
      });

      alert("Product uploaded!");
      document.getElementById("product-name").value = "";
      document.getElementById("product-price").value = "";
      document.getElementById("product-image").value = "";
      loadProducts(); // Refresh product list
    }

    async function loadProducts() {
      const container = document.getElementById("product-list");
      container.innerHTML = "";
      const snapshot = await getDocs(collection(db, "products"));
      snapshot.forEach(doc => {
        const data = doc.data();
        const div = document.createElement("div");
        div.className = "product-card";
        div.innerHTML = `
          <img src="${data.imageUrl}" alt="${data.name}">
          <h4>${data.name}</h4>
          <p>$${data.price.toFixed(2)}</p>
          <button onclick='addToCart({ name: "${data.name}", price: ${data.price} })'>Add to Cart</button>
        `;
        container.appendChild(div);
      });
    }

    function register() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      createUserWithEmailAndPassword(auth, email, pass)
        .then(() => alert("Registered successfully"))
        .catch(error => alert(error.message));
    }

    function login() {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('password').value;
      signInWithEmailAndPassword(auth, email, pass)
        .then(() => alert("Logged in"))
        .catch(error => alert(error.message));
    }

    function logout() {
      signOut(auth).then(() => alert("Logged out"));
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById('auth-section').style.display = 'none';
        try {
          const roleDoc = await getDoc(doc(db, "roles", user.email));
          if (roleDoc.exists() && roleDoc.data().role === "admin") {
            document.getElementById('admin-orders-btn').style.display = 'inline-block';
            document.getElementById('upload-section').style.display = 'block';
          }
        } catch (error) {
          console.error("Role check failed:", error);
        }
      } else {
        currentUser = null;
        document.getElementById('auth-section').style.display = 'block';
        document.getElementById('admin-orders-btn').style.display = 'none';
        document.getElementById('upload-section').style.display = 'none';
      }
    });

    window.onload = () => {
      updateCartCount();
      showProducts();
      loadProducts();
    };
  </script>
</body>
</html>
